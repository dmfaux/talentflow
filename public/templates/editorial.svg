<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Editorial template preview">
  <defs>
    <pattern id="ed-grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#0b0f1c" stroke-opacity="0.05" stroke-width="1" />
    </pattern>
  </defs>
  <!-- Canvas -->
  <rect width="600" height="400" fill="#f3f0e8" />
  <rect width="600" height="400" fill="url(#ed-grid)" />

  <!-- Top-left logo mark + name -->
  <g transform="translate(60 48)">
    <rect x="0" y="0" width="22" height="22" rx="5" fill="#2b3a67" />
    <rect x="30" y="7" width="70" height="8" rx="2" fill="#0b0f1c" fill-opacity="0.45" />
  </g>

  <!-- Italic headline (rendered as rounded bars for a neutral mock) -->
  <g transform="translate(60 108)">
    <rect x="0" y="0" width="400" height="26" rx="3" fill="#2b3a67" transform="skewX(-6)" />
    <rect x="0" y="38" width="320" height="26" rx="3" fill="#2b3a67" transform="skewX(-6)" />
  </g>

  <!-- Mono metadata strip -->
  <g transform="translate(60 206)" font-family="ui-monospace, monospace" font-size="10" fill="#58607a" letter-spacing="1.5">
    <text x="0" y="10">ENGINEERING · CAPE TOWN · PERMANENT</text>
  </g>

  <!-- Body text lines -->
  <g transform="translate(60 232)" fill="#1a2033" fill-opacity="0.35">
    <rect x="0" y="0" width="480" height="6" rx="2" />
    <rect x="0" y="14" width="470" height="6" rx="2" />
    <rect x="0" y="28" width="450" height="6" rx="2" />
    <rect x="0" y="42" width="340" height="6" rx="2" />
  </g>

  <!-- Application card -->
  <g transform="translate(60 300)">
    <rect x="0" y="0" width="480" height="72" rx="8" fill="#ffffff" stroke="#0b0f1c" stroke-opacity="0.08" />
    <rect x="20" y="16" width="90" height="8" rx="2" fill="#0b0f1c" fill-opacity="0.45" />
    <rect x="20" y="34" width="440" height="22" rx="4" fill="#2b3a67" />
  </g>
</svg>
