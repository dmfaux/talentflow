<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Modern template preview">
  <defs>
    <linearGradient id="mod-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2fa4a8" />
      <stop offset="1" stop-color="#f2b544" />
    </linearGradient>
  </defs>

  <!-- Page bg -->
  <rect width="600" height="400" fill="#f7f5ee" />

  <!-- Hero split: left info panel (primary) -->
  <rect x="0" y="0" width="340" height="260" fill="#123c6b" />

  <!-- Logo badge + name on left -->
  <g transform="translate(32 32)">
    <rect x="0" y="0" width="26" height="26" rx="6" fill="#ffffff" />
    <rect x="5" y="8" width="16" height="3" rx="1" fill="#123c6b" />
    <rect x="5" y="14" width="11" height="3" rx="1" fill="#123c6b" />
    <rect x="36" y="9" width="64" height="8" rx="2" fill="#ffffff" fill-opacity="0.6" />
  </g>

  <!-- Title on left -->
  <g transform="translate(32 80)">
    <rect x="0" y="0" width="260" height="18" rx="3" fill="#ffffff" />
    <rect x="0" y="26" width="210" height="18" rx="3" fill="#ffffff" fill-opacity="0.85" />
  </g>

  <!-- Pills -->
  <g transform="translate(32 140)">
    <rect x="0" y="0" width="72" height="20" rx="10" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.3" />
    <rect x="82" y="0" width="60" height="20" rx="10" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.3" />
  </g>

  <!-- Teaser lines on left -->
  <g transform="translate(32 180)" fill="#ffffff" fill-opacity="0.6">
    <rect x="0" y="0" width="270" height="5" rx="2" />
    <rect x="0" y="11" width="250" height="5" rx="2" />
    <rect x="0" y="22" width="200" height="5" rx="2" />
  </g>

  <!-- Right decorative panel -->
  <g>
    <rect x="340" y="0" width="260" height="260" fill="url(#mod-grad)" />
    <!-- large offset circle -->
    <circle cx="560" cy="70" r="110" fill="#123c6b" fill-opacity="0.2" />
    <!-- medium circle (white) -->
    <circle cx="400" cy="210" r="80" fill="#ffffff" fill-opacity="0.16" />
    <!-- small accent -->
    <circle cx="490" cy="170" r="40" fill="#f2b544" fill-opacity="0.55" />
    <!-- diagonal bar -->
    <g transform="translate(470 140) rotate(-28)">
      <rect x="-180" y="-7" width="360" height="14" rx="7" fill="#123c6b" fill-opacity="0.3" />
    </g>
    <!-- stroke ring -->
    <circle cx="560" cy="70" r="110" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1" />
  </g>

  <!-- Body copy below hero -->
  <g transform="translate(60 288)" fill="#0b0f1c" fill-opacity="0.35">
    <rect x="0" y="0" width="96" height="9" rx="2" fill="#0b0f1c" fill-opacity="0.75" />
    <rect x="0" y="20" width="480" height="5" rx="2" />
    <rect x="0" y="31" width="468" height="5" rx="2" />
  </g>

  <!-- Primary band for floating card -->
  <rect x="0" y="340" width="600" height="60" fill="#123c6b" />

  <!-- Floating card (overlapping band) -->
  <g transform="translate(140 322)">
    <rect x="0" y="0" width="320" height="66" rx="10" fill="#ffffff" />
    <rect x="20" y="16" width="100" height="8" rx="2" fill="#0b0f1c" fill-opacity="0.45" />
    <rect x="20" y="34" width="280" height="20" rx="5" fill="#123c6b" />
  </g>
</svg>
