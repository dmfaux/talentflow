services:
  postgres:
    image: postgres:16-alpine
    container_name: talentstream-postgres
    environment:
      POSTGRES_USER: talentstream
      POSTGRES_PASSWORD: talentstream_dev
      POSTGRES_DB: interview_insider
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
